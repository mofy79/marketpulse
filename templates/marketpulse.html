<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketPulse — Din Daglige Markedsoversigt</title>
<style>
:root {
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --surface2: #f8fafc;
  --border:   #e2e8f0;
  --border2:  #cbd5e1;
  --text:     #1e293b;
  --dim:      #64748b;
  --dim2:     #94a3b8;
  --green:    #16a34a;
  --green-bg: #f0fdf4;
  --green-bd: #bbf7d0;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --red-bd:   #fecaca;
  --yellow:   #d97706;
  --yellow-bg:#fffbeb;
  --blue:     #2563eb;
  --blue-bg:  #eff6ff;
  --blue-bd:  #bfdbfe;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:var(--shadow)}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--blue)}
.logo span{color:var(--dim)}
.hdr-right{display:flex;gap:14px;align-items:center}
.upd{color:var(--dim);font-size:12px;display:flex;align-items:center;gap:5px}
.btn{background:#fff;border:1px solid var(--border2);color:var(--text);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:.2s;box-shadow:var(--shadow)}
.btn:hover{background:var(--bg);border-color:var(--blue)}
.live{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Layout ── */
.wrap{max-width:1560px;margin:0 auto;padding:20px 20px}

/* ── Loading ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--dim)}
.dots{display:flex;gap:6px}
.dot{width:8px;height:8px;background:var(--blue);border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* ── Section label ── */
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Bias hero ── */
.bias-hero{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-md);overflow:hidden;margin-bottom:16px}
.bias-top{padding:20px 24px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:start}
.bias-badge{text-align:center;padding:16px 20px;border-radius:10px;min-width:130px}
.bias-badge.BULLISH{background:var(--green-bg);border:1px solid var(--green-bd)}
.bias-badge.BEARISH{background:var(--red-bg);border:1px solid var(--red-bd)}
.bias-badge.NEUTRAL{background:var(--yellow-bg);border:1px solid #fde68a}
.bias-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.bias-val{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.bias-val.BULLISH{color:var(--green)}
.bias-val.BEARISH{color:var(--red)}
.bias-val.NEUTRAL{color:var(--yellow)}
.bias-score{font-size:12px;color:var(--dim);margin-top:5px}
.bias-main h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.bias-main p{font-size:13px;color:#475569;line-height:1.6}
.bias-summary{font-size:12px;color:var(--dim);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6}
.bias-port{min-width:180px}
.port-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px}
.port-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
.port-name{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.badge.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bias-chips{background:var(--bg);padding:12px 24px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border)}
.chip{font-size:11px;padding:4px 10px;border-radius:5px;font-weight:600}
.chip.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.chip.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ── Pulse row ── */
.pulse-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.pulse-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.p-lbl{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:2px}
.p-val{font-size:24px;font-weight:800;letter-spacing:-0.5px;line-height:1.1}
.p-sub{font-size:12px;color:var(--dim);margin-top:3px}
.p-explain{font-size:11px;color:var(--dim2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);line-height:1.4}
.fg-bar{position:relative;height:6px;background:linear-gradient(to right,#ef4444,#fbbf24,#22c55e);border-radius:3px;margin:6px 0 4px}
.fg-pin{position:absolute;width:3px;height:12px;background:#1e293b;border-radius:2px;top:-3px;transform:translateX(-50%);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ── Grids ── */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}

/* ── Market cards ── */
.region{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.reg-hdr{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.reg-title{font-size:12px;font-weight:700;color:var(--text)}
.reg-sub{font-size:11px;color:var(--dim)}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .15s}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--surface2)}
.mname{font-size:13px;font-weight:500;color:var(--text)}
.mprice{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.mchg{font-size:11px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--dim)}

/* ── Crypto ── */
.crypto-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.cc{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 13px;box-shadow:var(--shadow);transition:.15s}
.cc:hover{box-shadow:var(--shadow-md);border-color:var(--blue-bd)}
.cc-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cc-img{width:24px;height:24px;border-radius:50%}
.cc-sym{font-size:13px;font-weight:700;color:var(--text)}
.cc-rank{font-size:10px;color:var(--dim2)}
.cc-price{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.cc-chg{font-size:11px;font-weight:600;margin-top:1px}
.cc-week{font-size:10px;color:var(--dim);margin-top:2px}
.cc-mcap{font-size:10px;color:var(--dim2);margin-top:3px}

/* ── Signals ── */
.sig-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.sig-item{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:flex-start}
.sig-item.bullish{border-left:3px solid var(--green)}
.sig-item.bearish{border-left:3px solid var(--red)}
.sig-item.risk-off{border-left:3px solid var(--yellow)}
.sig-item.mixed{border-left:3px solid var(--blue)}
.sig-item.contrarian-buy{border-left:3px solid #8b5cf6}
.sig-item.neutral{border-left:3px solid var(--border2)}
.sig-icon{font-size:18px;flex-shrink:0}
.sig-text{font-size:12px;color:var(--text);line-height:1.5}

/* ── Insider ── */
.ins-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.ins-hdr{background:var(--surface2);padding:12px 16px;border-bottom:1px solid var(--border)}
.ins-hdr h3{font-size:13px;font-weight:700;color:var(--text)}
.ins-hdr p{font-size:11px;color:var(--dim);margin-top:2px}
.ins-table{width:100%;border-collapse:collapse}
.ins-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
.ins-table td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text)}
.ins-table tr:last-child td{border-bottom:none}
.ins-table tr:hover td{background:var(--surface2)}
.trade-b{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.trade-s{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.ins-footer{padding:10px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--dim)}

/* ── Info box ── */
.info-box{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;padding:12px 14px;font-size:12px;color:#1e40af;line-height:1.5;margin-bottom:12px}
.info-box strong{font-weight:700}

/* ── Footer ── */
.footer{text-align:center;padding:24px 0 12px;color:var(--dim2);font-size:11px;border-top:1px solid var(--border);margin-top:8px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim2)}

/* ── Responsive ── */
@media(max-width:1200px){.crypto-grid{grid-template-columns:repeat(4,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.bias-top{grid-template-columns:1fr}.g3{grid-template-columns:repeat(2,1fr)}.pulse-row{grid-template-columns:repeat(2,1fr)}.crypto-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.g3,.g4,.g2,.crypto-grid,.sig-grid{grid-template-columns:1fr}.pulse-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">Market<span>Pulse</span></div>
  <div class="hdr-right">
    <span class="upd" id="upd"><span class="live"></span>Indlæser...</span>
    <button class="btn" onclick="loadData()">↻ Opdater nu</button>
  </div>
</header>

<div class="wrap" id="root">
  <div class="loader">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <span style="color:var(--dim);font-size:13px">Henter markedsdata fra hele verden...</span>
  </div>
</div>

<script>
/* ─── helpers ─── */
function fmt(p){
  if(p==null) return "—";
  if(p>=10000) return p.toLocaleString("da-DK",{maximumFractionDigits:0});
  if(p>=1000)  return p.toLocaleString("da-DK",{maximumFractionDigits:0});
  if(p>=100)   return p.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)     return p.toLocaleString("da-DK",{minimumFractionDigits:3,maximumFractionDigits:3});
  return p.toLocaleString("da-DK",{minimumFractionDigits:4,maximumFractionDigits:5});
}
function fmtC(p){
  if(p==null) return "—";
  if(p>=1000) return "$"+p.toLocaleString("da-DK",{maximumFractionDigits:0});
  if(p>=1)    return "$"+p.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});
  return "$"+p.toFixed(5);
}
function fmtMcap(v){
  if(!v) return "";
  if(v>=1e12) return "$"+(v/1e12).toFixed(2)+"T";
  if(v>=1e9)  return "$"+(v/1e9).toFixed(1)+"B";
  return "$"+(v/1e6).toFixed(0)+"M";
}
function pct(v){ if(v==null)return"—"; return(v>0?"+":"")+v.toFixed(2)+"%" }
function cls(v){ return v>0?"up":v<0?"down":"flat" }
function arr(v){ return v>0?"▲":v<0?"▼":"●" }

/* ─── Bias hero ─── */
function renderBias(a){
  if(!a) return "";
  const icon = a.overall==="BULLISH"?"▲":a.overall==="BEARISH"?"▼":"●";
  const scoreSign = a.score>0?"+":"";
  const scoreColor = a.score>0?"var(--green)":a.score<0?"var(--red)":"var(--yellow)";
  const portRows = [
    ...(a.buy_assets||[]).slice(0,4).map(x=>`<div class="port-item"><span class="port-name">${x}</span><span class="badge buy">KØB</span></div>`),
    ...(a.sell_assets||[]).slice(0,2).map(x=>`<div class="port-item"><span class="port-name">${x.slice(0,24)}</span><span class="badge sell">REDUCER</span></div>`),
  ].join("")||'<div style="font-size:11px;color:var(--dim2)">Ingen klare signaler</div>';
  const buys=(a.buy_assets||[]).map(x=>`<span class="chip buy">↑ ${x}</span>`).join("");
  const sells=(a.sell_assets||[]).map(x=>`<span class="chip sell">↓ ${x}</span>`).join("");
  return `<div class="bias-hero">
    <div class="bias-top">
      <div class="bias-badge ${a.overall}">
        <div class="bias-lbl">Ugens retning</div>
        <div class="bias-val ${a.overall}">${icon} ${a.overall}</div>
        <div class="bias-score" style="color:${scoreColor}">Score: ${scoreSign}${a.score} &nbsp;(${a.bull_count} op / ${a.bear_count} ned)</div>
      </div>
      <div class="bias-main">
        <h2>Hvad sker der i markedet?</h2>
        <p>${a.recommendation}</p>
        <div class="bias-summary">${a.summary||""}</div>
      </div>
      <div class="bias-port">
        <div class="port-title">Din portefølje</div>
        ${portRows}
      </div>
    </div>
    ${buys||sells?`<div class="bias-chips">${buys}${sells}</div>`:""}
  </div>`;
}

/* ─── Pulse row ─── */
function renderPulse(markets, fg){
  const vix = (markets?.us||{})["VIX"]||{};
  const dxy = (markets?.forex||{})["DXY"]||{};
  const t10 = (markets?.bonds||{})["US 10Y"]||{};
  const fgv = fg?.today?.value??50;
  const fgl = fg?.today?.label??"Neutral";
  const fgy = fg?.yesterday?.value;
  const fgtrend = fgy!=null?(fgv>fgy?" ↑":fgv<fgy?" ↓":""):"";
  const fgColor = fgv<25?"var(--red)":fgv<45?"var(--yellow)":fgv<55?"var(--dim)":"var(--green)";

  const vixExplain = vix.price>30
    ? "Meget høj — markedet er bange. Store udsving kan forventes."
    : vix.price>20
    ? "Forhøjet — der er usikkerhed ude. Hold øje med nyheder."
    : "Lav — markedet er roligt. Institutioner er ikke nervøse.";

  const fgExplain = fgv<25
    ? "Ekstrem frygt — historisk set er dette ofte et godt tidspunkt at købe."
    : fgv<45
    ? "Frygt dominerer — investorer er forsigtige og nervøse."
    : fgv<55
    ? "Neutralt — hverken begejstring eller panik."
    : fgv<75
    ? "Grådighed — optimisme i markedet, vær opmærksom."
    : "Ekstrem grådighed — markedet er euphoric. Vær forsigtig.";

  const dxyExplain = (dxy.week_pct||0)>1
    ? "Dollar styrkes — typisk negativt for guld og råvarer."
    : (dxy.week_pct||0)<-1
    ? "Dollar svækkes — godt for guld, råvarer og eksporterende lande."
    : "Dollar relativt stabil denne uge.";

  const t10Explain = (t10.price||0)>5
    ? "Meget høj rente — dyre lån, pres på aktier med høj gæld."
    : (t10.price||0)>4
    ? "Høj rente — obligationer konkurrerer med aktier."
    : "Moderat rente — relativt positivt for aktiemarkedet.";

  return `<div class="pulse-row">
    <div class="pulse-card">
      <div class="p-lbl">Fear &amp; Greed Index</div>
      <div class="p-val" style="color:${fgColor}">${fgv}${fgtrend}</div>
      <div class="p-sub">${fgl}${fgy!=null?` (i går: ${fgy})`:""}  </div>
      <div class="fg-bar"><div class="fg-pin" style="left:${fgv}%"></div></div>
      <div class="p-explain">${fgExplain}</div>
    </div>
    <div class="pulse-card">
      <div class="p-lbl">VIX — Markedsangst</div>
      <div class="p-val ${cls(-(vix.change_pct||0))}">${vix.price!=null?vix.price.toFixed(1):"—"}</div>
      <div class="p-sub ${cls(vix.change_pct)}">${arr(vix.change_pct)} ${pct(vix.change_pct)} i dag</div>
      <div class="p-explain">${vixExplain}</div>
    </div>
    <div class="pulse-card">
      <div class="p-lbl">USD Index (DXY)</div>
      <div class="p-val ${cls(dxy.change_pct)}">${dxy.price!=null?dxy.price.toFixed(2):"—"}</div>
      <div class="p-sub ${cls(dxy.change_pct)}">${arr(dxy.change_pct)} ${pct(dxy.change_pct)} dag · ${pct(dxy.week_pct)} uge</div>
      <div class="p-explain">${dxyExplain}</div>
    </div>
    <div class="pulse-card">
      <div class="p-lbl">US 10-årig Rente</div>
      <div class="p-val ${cls(t10.change_pct)}">${t10.price!=null?t10.price.toFixed(2)+"%":"—"}</div>
      <div class="p-sub ${cls(t10.change_pct)}">${arr(t10.change_pct)} ${pct(t10.change_pct)} i dag</div>
      <div class="p-explain">${t10Explain}</div>
    </div>
  </div>`;
}

/* ─── Market region ─── */
function renderRegion(title, emoji, data, note){
  if(!data||!Object.keys(data).length) return "";
  const rows = Object.entries(data).filter(([n])=>n!=="VIX").map(([name,d])=>`
    <div class="mrow">
      <span class="mname">${name}</span>
      <div>
        <div class="mprice">${fmt(d.price)}</div>
        <div class="mchg ${cls(d.change_pct)}">${arr(d.change_pct)} ${pct(d.change_pct)} <span style="color:var(--dim2)">(${pct(d.week_pct)} uge)</span></div>
      </div>
    </div>`).join("");
  return `<div class="region">
    <div class="reg-hdr"><span class="reg-title">${emoji} ${title}</span>${note?`<span class="reg-sub">${note}</span>`:""}
    </div>${rows}
  </div>`;
}

/* ─── Signals ─── */
function renderSignals(analysis){
  if(!analysis?.signals?.length) return "";
  const items = analysis.signals.map(s=>`
    <div class="sig-item ${s.type}">
      <span class="sig-icon">${s.icon}</span>
      <span class="sig-text">${s.text}</span>
    </div>`).join("");
  return `
  <div class="info-box">
    <strong>Hvad kigger professionelle investorer på?</strong> Disse signaler er baseret på prisudvikling,
    volatilitet og markedsstruktur — de samme ting som institutionelle investorer bruger til at tage
    beslutninger. Røde streger = advarsel. Grønne streger = positivt signal.
  </div>
  <div class="sig-grid">${items}</div>`;
}

/* ─── Crypto ─── */
function renderCrypto(crypto){
  if(!crypto||!Object.keys(crypto).length) return "";
  let cards="",i=0;
  for(const [sym,d] of Object.entries(crypto)){
    if(i++>=12) break;
    cards+=`<div class="cc">
      <div class="cc-top">
        <img class="cc-img" src="${d.image}" alt="${sym}" onerror="this.style.display='none'">
        <div><div class="cc-sym">${sym}</div><div class="cc-rank">#${d.rank} markedsværdi</div></div>
      </div>
      <div class="cc-price">${fmtC(d.price)}</div>
      <div class="cc-chg ${cls(d.change_pct)}">${arr(d.change_pct)} ${pct(d.change_pct)} i dag</div>
      <div class="cc-week">Uge: <span class="${cls(d.week_pct)}">${pct(d.week_pct)}</span></div>
      <div class="cc-mcap">${fmtMcap(d.market_cap)}</div>
    </div>`;
  }
  return `<div class="info-box" style="margin-top:4px">
    <strong>Krypto som markedsindikator:</strong> Når Bitcoin og Ethereum stiger kraftigt er det typisk et tegn på
    "risk-on" — investorer tager risiko. Falder de markant, søger markedet mod sikkerhed.
  </div>
  <div class="crypto-grid">${cards}</div>`;
}

/* ─── Insider trades ─── */
function renderInsider(trades){
  const expl = `<div class="ins-hdr">
    <h3>Insider-handler — de seneste 7 dage</h3>
    <p>Insiders er direktører, bestyrelsesmedlemmer og store aktionærer. De ved mere end os — og de må kun handle på offentlig information. Køber en CEO aktier i sit eget selskab er det et stærkt signal.</p>
  </div>`;
  if(!trades?.length) return `<div class="ins-wrap">${expl}<div style="padding:16px;color:var(--dim);font-size:12px">Ingen insider-handler fundet for de seneste 7 dage.</div></div>`;
  const rows = trades.slice(0,15).map(t=>`<tr>
    <td style="color:var(--dim)">${t.date}</td>
    <td><strong style="color:var(--blue)">${t.ticker}</strong></td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.company}</td>
    <td style="color:var(--dim)">${t.title}</td>
    <td><span class="${t.is_buy?"trade-b":"trade-s"}">${t.type}</span></td>
    <td class="${t.is_buy?"up":"down"}">${t.price}</td>
    <td style="color:var(--dim)">${t.qty}</td>
    <td class="${t.is_buy?"up":"down"}" style="font-weight:700">${t.value}</td>
  </tr>`).join("");
  return `<div class="ins-wrap">${expl}
    <div style="overflow-x:auto">
      <table class="ins-table">
        <thead><tr><th>Dato</th><th>Aktie</th><th>Selskab</th><th>Titel</th><th>Type</th><th>Pris</th><th>Antal</th><th>Samlet værdi</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="ins-footer">Kilde: OpenInsider.com · P = Purchase (køb) er det stærkeste signal — insiders køber kun fordi de tror kursen stiger</div>
  </div>`;
}

/* ─── Main render ─── */
function renderAll(data){
  const m=data.markets||{}, c=data.crypto||{}, fg=data.fear_greed||{};
  const a=data.analysis||{}, ins=data.insider_trades||[];
  let html="";

  html+=renderBias(a);
  html+=renderPulse(m,fg);

  html+=`<div class="sec-label">Hvad sker der i de professionelles markeder</div>`;
  html+=renderSignals(a);

  html+=`<div class="sec-label">Globale aktiemarkeder</div>`;
  html+=`<div class="g3">`;
  html+=renderRegion("USA","🇺🇸",m.us,"S&P 500 · Nasdaq · Dow");
  html+=renderRegion("Europa","🇪🇺",m.eu,"DAX · FTSE · CAC");
  html+=renderRegion("Asien","🌏",m.asia,"Nikkei · Hang Seng");
  html+=`</div>`;

  html+=`<div class="sec-label">Råvarer · Valuta · Renter · Equity Futures</div>`;
  html+=`<div class="g4">`;
  html+=renderRegion("Råvarer","⛏️",m.commodities,"Guld · Olie · Gas");
  html+=renderRegion("Valuta (Forex)","💱",Object.fromEntries(Object.entries(m.forex||{}).filter(([k])=>k!=="DXY")),"EUR · GBP · JPY");
  html+=renderRegion("Renter","📋",m.bonds,"USA 2Y · 10Y · 30Y");
  html+=renderRegion("Futures (pre-market)","⚡",m.futures,"Viser retning inden markedet åbner");
  html+=`</div>`;

  html+=`<div class="sec-label">Kryptomarkedet — top 12</div>`;
  html+=renderCrypto(c);

  html+=`<div class="sec-label" style="margin-top:18px">Insider-handler — hvad ved de selv noget om?</div>`;
  html+=renderInsider(ins);

  html+=`<div class="footer">
    MarketPulse &nbsp;·&nbsp; Data: Yahoo Finance, CoinGecko, OpenInsider
    &nbsp;·&nbsp; Opdateres automatisk hver time
    &nbsp;·&nbsp; <em>Kun til informationsformål — ikke investeringsrådgivning</em>
  </div>`;

  document.getElementById("root").innerHTML=html;
  document.getElementById("upd").innerHTML=`<span class="live"></span>Sidst opdateret: ${data.updated}`;
}

/* ─── Fetch ─── */
async function loadData(){
  document.getElementById("upd").innerHTML=`Henter data...`;
  try{
    const r=await fetch("/api/data");
    if(!r.ok) throw new Error("HTTP "+r.status);
    renderAll(await r.json());
  }catch(e){
    document.getElementById("root").innerHTML=`<div style="text-align:center;padding:60px;color:var(--red)">
      <div style="font-size:32px;margin-bottom:10px">⚠️</div>
      <div style="font-size:15px;font-weight:600">Kunne ikke hente data</div>
      <div style="font-size:12px;color:var(--dim);margin-top:6px">${e.message}</div>
      <button class="btn" style="margin-top:16px" onclick="loadData()">Prøv igen</button>
    </div>`;
    document.getElementById("upd").innerHTML="Fejl ved datahentning";
  }
}

loadData();
</script>
</body>
</html>
